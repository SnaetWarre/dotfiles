# Tofi config - dmenu mode for clipboard (same as drun)

# Window settings - fullscreen centered
width = 100%
height = 100%
border-width = 0
outline-width = 0
padding-left = 35%
padding-top = 35%
result-spacing = 25
num-results = 5
font = monospace
background-color = #000a

# Appearance - no border
border-color = #00000000
corner-radius = 0

# Text colors - light gray theme
text-color = #b0b0b0
selection-color = #444444

# Hide the cursor
hide-cursor = true

# Matching
fuzzy-match = true

# Behavior
require-match = false

# Prompt
prompt-text = "Clipboard"
