# Tofi config - dmenu mode for clipboard (same as drun)

# Window settings - fullscreen centered
width = 100%
height = 100%
border-width = 0
outline-width = 0
padding-left = 30%
padding-top = 35%
result-spacing = 25
num-results = 5
font = monospace
background-color = #000a

# Text colors - light gray theme
text-color = #d0d0d0
selection-color = #888888

# Hide the cursor
hide-cursor = true

# DRUN settings
drun-launch = true

# Matching
fuzzy-match = true

# Behavior
require-match = false

prompt-text = "clipboard > "
