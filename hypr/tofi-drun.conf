# Tofi config - Fullscreen app launcher

# Window settings - fullscreen centered
width = 100%
height = 100%
border-width = 0
outline-width = 0
padding-left = 35%
padding-top = 35%
result-spacing = 25
num-results = 5
font = monospace
background-color = #000a

# Appearance - no border
border-color = #00000000
corner-radius = 0

# Text colors - light gray theme
prompt-color = #a0a0a0
match-color = #888888
text-color = #b0b0b0
selection-color = #444444
selected-match-color = #444444
selected-text-color = #b0b0b0

# Hide the cursor
hide-cursor = true

# DRUN settings
drun = true
drun-use-term = false
drun-show-actions = false
drun-icon-size = 32
drun-icon-theme = "Tela-circle-grey-dark"
drun-match-fields = name

# Matching
fuzzy-match = true
case-sensitive = false

# Behavior
require-match = false
allow-images = true

# Initial index
initial-index = 0
